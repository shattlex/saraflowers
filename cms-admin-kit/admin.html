<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SARA FLOWERS Admin</title>
    <link rel="icon" href="data:," />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=PT+Sans:wght@400;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="./admin.css" />
  </head>
  <body>
    <div id="admin-auth" class="auth-gate">
      <form id="auth-form" class="auth-card" autocomplete="off">
        <h1>SARA CMS</h1>
        <p>Вход в админ-панель</p>
        <label>
          Логин
          <input id="auth-login" type="text" required />
        </label>
        <label>
          Пароль
          <input id="auth-password" type="password" required />
        </label>
        <button class="btn btn-primary" type="submit">Войти</button>
        <p id="auth-error" class="auth-error" aria-live="polite"></p>
      </form>
    </div>

    <div id="admin-app" class="admin-layout admin-hidden">
      <aside class="sidebar">
        <h1>SARA CMS</h1>
        <p class="sidebar-subtitle">Конструктор контента без кода</p>
        <div class="sidebar-actions">
          <button id="add-page-btn" class="btn btn-primary" type="button">+ Страница</button>
          <button id="reset-btn" class="btn" type="button">Обновить с сайта</button>
        </div>
        <p id="sync-status" class="sidebar-status">Синхронизация...</p>
        <nav class="tabs" aria-label="Разделы админки">
          <button id="tab-pages" class="tab is-active" type="button">Страницы</button>
          <button id="tab-media" class="tab" type="button">Медиа</button>
        </nav>
        <a class="back-link" href="/">Открыть сайт</a>
      </aside>

      <main class="main-panel">
        <section id="pages-panel" class="panel is-visible">
          <div class="panel-grid">
            <div class="card">
              <h2>Список страниц</h2>
              <ul id="pages-list" class="pages-list"></ul>
            </div>

            <div id="page-editor" class="card empty-state">
              Выберите страницу слева или создайте новую.
            </div>
          </div>
        </section>

        <section id="media-panel" class="panel">
          <div class="panel-grid media-grid">
            <div class="card">
              <h2>Добавить изображение</h2>
              <form id="media-form" class="stacked-form">
                <label>
                  Название
                  <input id="media-name" required type="text" placeholder="Например: Hero букет" />
                </label>
                <label>
                  URL изображения
                  <input id="media-url" type="url" placeholder="https://..." />
                </label>
                <label>
                  Или загрузите файл
                  <input id="media-file" type="file" accept="image/*" />
                </label>
                <button class="btn btn-primary" type="submit">Сохранить изображение</button>
              </form>
            </div>

            <div class="card">
              <h2>Медиатека</h2>
              <ul id="media-list" class="media-list"></ul>
            </div>
          </div>
        </section>
      </main>
    </div>

    <datalist id="media-options"></datalist>

    <script type="module" src="./admin.js"></script>
  </body>
</html>
